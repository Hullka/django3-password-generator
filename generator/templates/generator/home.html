<!-- Подключения статических папокс css, js -->
{% load static %}
<html lang="en">

<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
<link rel="stylesheet" href="{% static '/css/style_home.css'%}"  type="text/css">
<script src="{% static '/js/home.js' %}"></script>
<script src="{% static '/js/lang.js' %}"></script>
</head>

<body class="text-center">
<div class="container text-center" id="password">
  <h1 class="generator">Password Generator</h1>
  <form action="{% url 'password' %}">
    <div class="displayed">
      <table>
          <tr>
            <th>
              <input class="uppercase" type="checkbox" name="uppercase"> Uppercase
            </th>
            <th>
              <select class="length" name="length">
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12" selected="selected">12</option>
                <option value="13">13</option>
                <option value="14">14</option>
              </select> Length
            </th>
        </tr>
        <tr>
          <th>
          <input class="numbers" type="checkbox" name="numbers"> Numbers
          </th>
        </tr>
        <tr>
          <th>
            <input class="special" type="checkbox" name="special"> Special Characters
          </th>
        </tr>
        
    </table>
</div>
  
    <input type="submit" value="Generator Password" class="btn btn-primary">
    <br><br>
    <a href="{% url 'about' %}">About Page</a>
    <!-- <br>
    <select class="change-lang">
      <option value="ua">UA</option>
      <option value="ru" selected>RU</option>
      <option value="en">EN</option>
  </select> -->
</form>
</div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js" integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.min.js" integrity="sha384-cuYeSxntonz0PPNlHhBs68uyIAVpIIOZZ5JqeqvYYIcEL727kskC66kF92t6Xl2V" crossorigin="anonymous"></script>
</html>
