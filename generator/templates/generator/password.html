{% load static %}
<!DOCTYPE html>
<html>
<a href="{% url 'home' %}" class="btn btn-warning">Home</a>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
<link rel="stylesheet" href="{% static '/css/style_password.css'%}"  type="text/css">
</head>
<body>
<div class="container text-center" id="password">
    <h1>Your password is:</h1>
    <h2><input class="alert alert-success" id="text" value="{{ password }}"></h2>
    <br>
    <button type="submit" value="Update" class="btn btn-warning" onClick="window.location.reload();">Update</button>
    <button onclick="copytext()" type="button" class="btn btn-primary" value="Copy" text-align="center">Copy</button>
    <br><br>
</div>
{% block extrahead %}
<script type="text/javascript" src="{% static 'js/password_js.js' %}"></script>
{% endblock extrahead %}
</html>
